task_routing:
  new_zkverify_case:
    load:
      - zkverify.invariants.yaml
      - execution.plan.yaml
      - schema.bindings.yaml
      - security.boundaries.yaml
    then: "ask and lock submission mode + indexer strategy before implementation"

  writing_kurier_api_routes:
    load:
      - zkverify.invariants.yaml
      - kurier.api.yaml
      - kurier.status.yaml
      - schema.bindings.yaml
      - security.boundaries.yaml
    required_outputs:
      - "pages/api/submit-proof.ts"
      - "pages/api/proof-status.ts"
      - "pages/api/proof-aggregation.ts if aggregation-kurier"

  designing_proof_schema:
    load:
      - zkverify.invariants.yaml
      - schema.bindings.yaml
      - proof.statement.yaml
      - proof.systems.yaml
      - browser.proving.yaml

  aggregation_flow:
    load:
      - proof.aggregation.yaml
      - kurier.status.yaml
      - base.contract.verification.yaml
      - proof.statement.yaml

  direct_kurier_flow:
    load:
      - kurier.direct.yaml
      - kurier.api.yaml
      - kurier.status.yaml
      - base.contract.verification.yaml

  zkverifyjs_flow:
    load:
      - zkverifyjs.non_aggregation.yaml
      - zkverifyjs.sdk.yaml
      - proof.systems.yaml

  indexer_design:
    load:
      - indexer.strategy.yaml
      - env.schema.yaml
      - troubleshooting.yaml

  runbook_or_debugging:
    load:
      - runbook.local.yaml
      - troubleshooting.yaml
      - kurier.status.yaml
      - env.schema.yaml

  verifytrade_case_lookup:
    load:
      - cases/verifytrade/verifytrade.architecture.yaml
      - cases/verifytrade/verifytrade.debug-retro.yaml
      - zkverify.invariants.yaml

critical_doctrines:
  - "Proving is browser-only: server never receives witness or private inputs."
  - "Kurier API key is server-only: never use NEXT_PUBLIC_KURIER_API_KEY."
  - "Lock one submission mode per branch: aggregation-kurier OR kurier-direct OR zkverifyjs-non-aggregation."
  - "Lock one indexer strategy per case: thegraph OR sqlite OR hybrid."
  - "Do not mix aggregation tuple logic into direct or non-aggregation modes."
  - "businessDomain and aggregationDomainId are different fields and must never share one DOMAIN variable."
  - "Kurier text status is progress; Base contract precheck is the aggregation business gate."
  - "Aggregation mode must verify statement == leaf before contract precheck."
  - "Wallet prompt is blocked until route-specific precheck passes."
  - "No mock proofs in acceptance flows."
  - "Bind businessDomain, appId, userAddr, chainId, timestamp, and antiReplay token."
  - "Enforce anti-replay on server and contract with nullifier OR nonce OR orderId."
  - "Use incremental indexing; never scan from genesis on each request."


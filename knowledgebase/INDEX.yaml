# zkVerify + Kurier Knowledge Base
# Entry point for LLM agents

purpose: |
  Machine-optimized knowledge repository for designing and implementing
  zkVerify + Kurier proof verification flows. Start here, then load files
  based on task.

# ============================================================================
# CRITICAL: Load zkverify.invariants.yaml FIRST for any zkVerify/Kurier work.
# It contains non-negotiable rules that constrain all designs.
# ============================================================================

# ============================================================================
# KB tier layout (important - agents must understand this before querying):
#
#   knowledgebase/             <- OPERATIONAL  "protocol facts"
#                          Should be read as the "current standard" on every startup.
#                          Must be kept aligned with the latest docs.zkverify.io
#                          architecture/overview content.
#                          Schema / field / enum / API shape: this is the source
#                          of truth.
#
#   knowledgebase/handbook/    <- cases / examples (zkVerify Handbook style)
#                          Only consult when operational tier is insufficient.
#                          example.* series - "how other people use it".
#                          May lag slightly behind the current SDK.
#
#   knowledgebase/cases/       <- project-level case studies
#                          Concrete pitfalls + architecture + version locks
#                          from real projects.
#                          Currently: cases/verifytrade/ (Binance x TLSN x Noir x zkVerify)
#                          High priority: when your project shares the same stack,
#                          reuse these lessons directly.
#
# Query priority (high to low):
#   1. operational (knowledgebase/*.yaml) - protocol-level facts
#   2. cases/<current-project>/* - pitfalls from the project you are working on
#   3. handbook/example.* - generic examples
# ============================================================================


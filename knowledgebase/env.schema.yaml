# Environment Schema
# Split env layers and secret scopes

apps_web_env_local:
  file: "apps/web/.env.local"
  variables:
    KURIER_API_BASE_URL:
      type: url
      scope: server
      examples:
        testnet: "https://api-testnet.kurier.xyz/api/v1"
        mainnet: "https://api.kurier.xyz/api/v1"
    KURIER_API_KEY:
      type: secret
      scope: server_only
      required_for_modes:
        - aggregation-kurier
        - kurier-direct
    NEXT_PUBLIC_CHAIN_ID:
      type: number
      scope: client_public
      examples:
        base_sepolia: 84532
        base_mainnet: 8453
    NEXT_PUBLIC_BUSINESS_DOMAIN:
      type: string
      scope: client_public
    NEXT_PUBLIC_APP_ID:
      type: string
      scope: client_public
    ZKVERIFY_AGGREGATION_DOMAIN_ID:
      type: string_or_number
      scope: server
      required_for_modes:
        - aggregation-kurier
    NEXT_PUBLIC_BUSINESS_CONTRACT:
      type: evm_address
      scope: client_public
    NEXT_PUBLIC_ZKVERIFY_VERIFIER_CONTRACT:
      type: evm_address
      scope: client_public
    SQLITE_PATH:
      type: file_path
      scope: server
      required_for_indexer:
        - sqlite
        - hybrid

contracts_env:
  file: "contracts/.env"
  variables:
    PRIVATE_KEY:
      type: secret
      scope: deployment_only
    BASE_RPC_URL:
      type: url
      scope: deployment_runtime
    CHAIN_ID:
      type: number
      examples:
        base_sepolia: 84532
        base_mainnet: 8453
    ZKVERIFY_VERIFIER_CONTRACT:
      type: evm_address
    BUSINESS_CONTRACT:
      type: evm_address

forbidden:
  - NEXT_PUBLIC_KURIER_API_KEY
  - NEXT_PUBLIC_PRIVATE_KEY
  - client_seed_phrase
  - witness_in_env

scope_rules:
  client_public:
    allowed_prefix: NEXT_PUBLIC_
    must_not_include:
      - API secrets
      - private keys
      - mnemonic
  server_only:
    allowed_in:
      - API routes
      - server runtime
      - secret manager
    forbidden_in:
      - browser bundle
      - public docs with real values
  deployment_only:
    allowed_in:
      - Foundry deploy scripts
      - CI secret store

validation_commands:
  check_for_public_kurier_key: "rg -n \"NEXT_PUBLIC_KURIER_API_KEY|KURIER_API_KEY=.*\" apps/web"
  check_bundle_manually: "Inspect built JS for leaked key before production."

common_mistakes:
  - "One .env shared by web and contracts."
  - "Kurier API key prefixed NEXT_PUBLIC."
  - "Using Base mainnet chainId with Base Sepolia contracts."
  - "Using businessDomain as aggregation domain id."

